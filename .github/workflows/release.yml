name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: skills

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          if-no-files-found: error

  package:
    name: Package ${{ matrix.target }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            deb_arch: amd64
            rpm_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/

      - name: Make binary executable
        run: chmod +x target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build deb
        run: |
          cargo deb --no-build --no-strip \
            --target ${{ matrix.target }} \
            --deb-version ${{ steps.version.outputs.version }} \
            --output target/packages/${{ env.BINARY_NAME }}_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb

      - name: Build rpm
        run: |
          cargo generate-rpm \
            --target ${{ matrix.target }} \
            --set-metadata="version=${{ steps.version.outputs.version }}" \
            --output target/packages/${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-1.${{ matrix.rpm_arch }}.rpm

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.target }}
          path: target/packages/*
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binary-*
          path: artifacts/binaries/

      - name: Download all package artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: packages-*
          path: artifacts/packages/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Rename binaries with target suffix
          cp artifacts/binaries/binary-x86_64-unknown-linux-gnu/${{ env.BINARY_NAME }} \
             release/${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-linux-amd64
          cp artifacts/binaries/binary-aarch64-unknown-linux-gnu/${{ env.BINARY_NAME }} \
             release/${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-linux-arm64
          chmod +x release/${{ env.BINARY_NAME }}-*
          # Copy packages
          cp artifacts/packages/packages-*/* release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
